<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulário Ghibli</title>

    <!-- FAVICON DO TOTORO -->
    <link rel="shortcut icon" href="Assets/Favicon/Totoro_Favicon.webp" type="image/x-icon">

    <!-- CSS DA PÁGINA -->
    <link rel="stylesheet" href="Assets/Style/Calcifer.css">

    <!-- BIBLIOTECA DE ÍCONES -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 

    <!-- FONTE EXTERNA DO GOOGLE -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

</head>
<body>

    <!-- CONTAINER PRINCIPAL DO FORMULÁRIO -->
    <main class="container">
        <form class="formulario">
            <h1>Formulário Ghibli</h1>

            <div class="input_area">

                <!-- INPUT DO USUÁRIO -->
                <div class="input-box">
                    <input type="username" placeholder="Usuário" id="usuario" required>
                     <!-- ícone do usuário -->
                    <i class="bx bxs-user"></i>
                </div>

                <!-- INPUT DA SENHA -->
                <div class="input-box">
                    <input type="password" placeholder="Senha" id="senha" required>
                    <!-- ícone da senha -->
                    <i class="bx bxs-lock-alt"></i>
                </div>
            </div>

            <div class="senha_opcao">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>

                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit" class="login">Login</button>

            <div class="cadastro">
                <p>Não tem uma conta ? <a href="#">Cadastra-se</a></p>
            </div>

            <p class="obs">
                <strong>OBS:</strong> a senha é 123456
            </p>
        </form>
    </main>
</body>

<script src="Assets/Scripts/totoro.js"></script>

</html>
